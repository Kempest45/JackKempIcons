<!DOCTYPE html>
<html>
    
    <head>
    <title>Exciting shapes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"> </script>
    <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
    </style>
    </head>
    <style>
        body{
            background-image: url(icons/redlake.png);
            background-size: cover;
        }
    </style>

    <body>
        <script>
            var sound1 = new buzz.sound("iconsfx/alien.wav")
            var sound2 = new buzz.sound("iconsfx/terminator.wav")
            var sound3 = new buzz.sound("iconsfx/tank.wav")

            window.onload = function(){
                document.getElementById('aliensicon').addEventListener('click', function () {sound1.play();})
                document.getElementById('roboticon').addEventListener('click', function (){sound2.play();})
                document.getElementById('waricon').addEventListener('click', function (){sound3.play();})
            };
        </script>
        <div class="row">
            <div class="image-container"><img id="aliensicon" src="icons/ALIENS.png" onmouseover="this.src='icons/ALIENS.png';" onmouseout="this.src='icons/ALIENS.png';" height="200" width="170"/></div>
            <div class="image-container"><img id="moneyicon" src="icons/MONEY2.png" onmouseover="this.src='icons/MONEY.png';" onmouseout="this.src='icons/MONEY2.png';" height="190" width="200"/></div>
            <div class="image-container"><img id="waricon" src="icons/WAR.png" onmouseover="this.src='icons/WAR.png';" onmouseout="this.src='icons/WAR.png';" height="110" width="200"/></div>
    
        </div>

       
        <div class="row">
            <div class="image-container"><img id="monstericon" src="icons/MONSTER.png" height="170" width="200"/></div>
            <div class="image-container"><img id="pandemicicon" src="icons/PANDEMIC.png" height="200" width="200"/></div>
            <div class="image-container"><img id="securityicon" src="icons/SECURITY.png" height="180" width="200"/></div>
            </div>

      <div class="row">
            <div class="image-container"><img id="roboticon" src="icons/ROBOT.png" height="200" width="130"/></div>
            <div class="image-container"><img id="pandemicicon" src="icons/placeholder.webp" height="200" width="200"/></div>
            <div class="image-container"><img id="securityicon" src="icons/placeholder.webp" height="180" width="200"/></div>
            </div>
    </body>
    
</html>
